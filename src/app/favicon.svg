<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a8a4a"/>
      <stop offset="100%" stop-color="#0d5530"/>
    </linearGradient>
    <linearGradient id="pill1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2e9"/>
    </linearGradient>
    <linearGradient id="pill2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#cc2222"/>
    </linearGradient>
  </defs>

  <!-- Capsule pill rotated 45deg, centered -->
  <!-- White half -->
  <rect x="14" y="26" width="36" height="12" rx="6" fill="url(#pill1)"
        transform="rotate(-35 32 32)"/>
  <!-- Red half (covers right portion) -->
  <clipPath id="rightHalf">
    <rect x="32" y="0" width="32" height="64"/>
  </clipPath>
  <rect x="14" y="26" width="36" height="12" rx="6" fill="url(#pill2)"
        transform="rotate(-35 32 32)" clip-path="url(#rightHalf)"/>
  <!-- Dividing line -->
  <line x1="32" y1="18" x2="32" y2="46"
        stroke="rgba(0,0,0,0.15)" stroke-width="1.5"
        transform="rotate(-35 32 32)"/>

  <!-- Small cross/plus overlay -->
  <g transform="translate(44, 14)" opacity="0.9">
    <rect x="-3" y="-7" width="6" height="14" rx="2" fill="white"/>
    <rect x="-7" y="-3" width="14" height="6" rx="2" fill="white"/>
  </g>
</svg>
